<!DOCTYPE html>
<!-- Base HTML template for the Library Management System -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Responsive meta tag for mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Page title, can be overridden by child templates -->
    <title>{% block title %}Library Management{% endblock %}</title>
    <!-- Bootstrap CSS for styling and responsiveness -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS file -->
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
    <!-- Additional head content from child templates -->
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Navigation bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <!-- Brand link to homepage -->
            <a class="navbar-brand" href="{{ url_for('index') }}">Library Management</a>
            <div class="navbar-nav">
                <!-- Navigation links -->
                <a class="nav-link" href="{{ url_for('index') }}">Home</a>
            </div>
        </div>
    </nav>
    <!-- Main content container -->
    <div class="container mt-4">
        <!-- Page-specific content from child templates -->
        {% block body %}{% endblock %}
    </div>
    <!-- Bootstrap JavaScript for interactive components -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
